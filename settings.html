<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | HouseHunt Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">House<span>Hunt</span> Admin<span class="logo-subtitle">Owned by Aarambh Realtors</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="properties.html" class="nav-item"><i data-lucide="building"></i> Properties</a>
                <a href="users.html" class="nav-item"><i data-lucide="users"></i> Users</a>
                <a href="analytics.html" class="nav-item"><i data-lucide="bar-chart-3"></i> Analytics</a>
                <a href="messages.html" class="nav-item"><i data-lucide="message-square"></i> Support</a>
                <a href="settings.html" class="nav-item active"><i data-lucide="settings"></i> Settings</a>
            </nav>
            <div class="sidebar-footer"><p>© 2026 HouseHunt v1.0</p></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Global Settings</h1>
                <button class="add-btn">Save Changes</button>
            </div>

            <div class="settings-grid">
                <div class="settings-card">
                    <h3>App Configuration</h3>
                    <div class="form-group">
                        <label>Site Name</label>
                        <input type="text" value="HouseHunt">
                    </div>
                    <div class="form-group">
                        <label>Support Email</label>
                        <input type="email" value="support@househunt.com">
                    </div>
                    <div class="form-group">
                        <label>Commission Rate (%)</label>
                        <input type="number" value="2.5">
                    </div>
                </div>

                <div class="settings-card">
                    <h3>Security & API</h3>
                    <div class="form-group">
                        <label>Mapbox API Key</label>
                        <input type="password" value="pk.eyJ1IjoibWFwYm94In0.xxxx">
                    </div>
                    <div class="form-group">
                        <label>Payment Gateway Key</label>
                        <input type="password" value="rzp_test_xxxx">
                    </div>
                    <button class="secondary-btn">Rotate Keys</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
