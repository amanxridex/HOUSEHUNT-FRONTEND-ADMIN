<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | HouseHunt</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-main);
        }
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .login-card h2 { font-weight: 800; margin-bottom: 8px; }
        .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            outline: none; 
            font-weight: 600; 
        }
        .login-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: var(--white); 
            border: none; 
            border-radius: 14px; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer;
            margin-top: 10px;
        }
        .error-msg { 
            color: var(--danger); 
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 15px; 
            display: none; 
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo" style="margin-bottom: 20px;">House<span>Hunt</span> Admin</div>
        <h2>Welcome Back</h2>
        <p>Please enter admin credentials</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
            <p id="error" class="error-msg">Invalid username or password</p>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'Aarambhindia') {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
